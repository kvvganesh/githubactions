name: Artifacts Demo

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: creating file
        run: |
            echo "hello developer" > hello.txt
            sleep 2
            echo "file created"
      - name: uploading file
        uses: actions/upload-artifact@v4
        with:
          name: greeting-file
          path: hello.txt

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: downloading the file
        uses: actions/download-artifact@v4
        with:
          name: greeting-file
      
      - name: display the file
        run: cat hello.txt

       